<script id="jezaLessonPrefetch">
(function(){
  if(!('caches' in window) || !('fetch' in window)) return;
  var CACHE = 'jeza-offline-v5-11-assets';
  function fetchWithTimeout(url, ms){
    var controller = new AbortController();
    var timer = setTimeout(function(){controller.abort();}, ms || 12000);
    return fetch(url, {cache:'reload', signal:controller.signal}).finally(function(){clearTimeout(timer);});
  }
  window.addEventListener('load', function(){
    fetch('lesson-assets.json', {cache:'no-store'})
      .then(function(r){return r.ok ? r.json() : [];})
      .then(function(files){
        if(!files || !files.length) return;
        caches.open(CACHE).then(function(cache){
          var i = 0, active = 0, limit = 4;
          function next(){
            while(active < limit && i < files.length){
              var f = files[i++]; active++;
              fetchWithTimeout(f, 12000).then(function(r){
                if(r && r.ok) return cache.put(f, r.clone());
              }).catch(function(){}).finally(function(){active--; next();});
            }
          }
          next();
        });
      }).catch(function(){});
  });
})();
</script>
